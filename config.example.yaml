# =============================================================================
# wyf9s-discord-bot 配置示例
# 复制此文件为 config.yaml 并根据需要修改
# =============================================================================

token: "YOUR_BOT_TOKEN"
command_prefix: "//"

# 代理地址 (可选)
# proxy: "http://localhost:11451"

# =============================================================================
# 日志配置
# =============================================================================
log:
  level: "INFO"               # 控制台日志级别: DEBUG | INFO | WARNING | ERROR | CRITICAL
  file: "logs/{time:YYYY-MM-DD}.log"  # 日志文件路径 (null 禁用)
  file_level: "INFO"          # 文件日志级别 (null 则跟随 level)
  rotation: "1 days"          # 日志轮转周期
  retention: "3 days"         # 日志保留时间

# =============================================================================
# 管理操作执行日志 (无指令, 服务模块)
# =============================================================================
audit:
  enabled: false              # 是否启用
  global_channel: null        # 全局日志频道 ID (null 禁用)
  guilds: {}                  # 按服务器配置的日志频道 { guild_id: channel_id }

# =============================================================================
# Emoji 模块
# 指令: emoji, emoji-info, emoji-update
# =============================================================================
emoji:
  enabled: false
  slash: true
  prefix: true
  base_url: "https://ghimg.siiway.top/emoji"
  max_results: 25

# =============================================================================
# 工具/管理指令模块
# 指令: random, uuid, delete, clear-message, move-channel, sync, 2file
# =============================================================================
tools:
  enabled: false
  slash: true
  prefix: true

# =============================================================================
# 频道锁定模块
# 指令: lock, unlock, plan-lock, unplan-lock
# =============================================================================
lock:
  enabled: false
  slash: true
  prefix: true

# =============================================================================
# 自动删除 todo bot 消息 (无指令, 基于事件)
# =============================================================================
rmtodo:
  enabled: false
  todo_channels: []           # todo 频道 ID 列表
  author_id: 782105629572464652  # todo bot 的用户 ID
  remove_delay: 3             # 删除前等待秒数

# =============================================================================
# 自动删除消息 (无指令, 基于事件)
# =============================================================================
rmmsg:
  enabled: false
  nicks: []                   # 要自动删除的昵称模式列表 (支持通配符)

# =============================================================================
# 语音频道控制模块
# 指令: joinvc, leavevc
# =============================================================================
voicechannel:
  enabled: false
  slash: true
  prefix: true
  allowed_user_ids: []        # 允许使用 voice 命令的用户列表 (留空则所有人可用)

# =============================================================================
# 反垃圾消息模块 (无指令, 基于事件)
# =============================================================================
antispam:
  enabled: false
  spam-catcher: {}            # 按频道配置的捕获规则 (见下方示例)
  # 示例:
  # 1514685631316496615:
  #   spammer: ban              # 陌生人处理: kick | ban
  #   hacked: mute              # 疑似被盗处理: kick | ban | mute | 分钟数
  #   clear-message: 3          # 自动清理窗口 (分钟, null/false 禁用)
  #   public-log: true          # 是否在频道公开通知
  #   stranger-roles: [1318980288046698506, "新成员"]  # 被视为陌生人的角色列表 (支持身份组 ID 或名称)

# =============================================================================
# 管理员和权限配置
# =============================================================================
admins:
  users: []                   # 管理员用户 ID/名称列表 (拥有所有命令权限)

mods:
  users: []                   # 全局 mod 列表
  guilds: {}                  # 按服务器 mod 列表 { guild_id: [user...] }
