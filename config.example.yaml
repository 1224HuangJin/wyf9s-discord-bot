# =============================================================================
# wyf9s-discord-bot 配置示例
# 复制此文件为 config.yaml 并根据需要修改
# =============================================================================

token: "YOUR_BOT_TOKEN"
# 也可将 token 拆分到 tk.yaml 中 (仅需包含 token 字段), 程序会自动读取
command_prefix: "//"

# 代理地址 (可选)
# proxy: "http://localhost:11451"

# =============================================================================
# 日志配置
# =============================================================================
log:
  level: "INFO"               # 控制台日志级别: DEBUG | INFO | WARNING | ERROR | CRITICAL
  file: "logs/{time:YYYY-MM-DD}.log"  # 日志文件路径 (null 禁用)
  file_level: "INFO"          # 文件日志级别 (null 则跟随 level)
  rotation: "1 days"          # 日志轮转周期
  retention: "3 days"         # 日志保留时间

# =============================================================================
# 管理操作执行日志 (无指令, 服务模块)
# =============================================================================
audit:
  enabled: false              # 是否启用
  global_channel: null        # 全局日志频道 ID (null 禁用)
  guilds: {}                  # 按服务器配置的日志频道
  # 示例 (仅频道 ID):
  #   123456789:  987654321
  # 审计日志语言通过 /lang scope=server 设置

# =============================================================================
# Emoji 模块
# 指令: /emoji update (admin), /emoji info (所有人), /e (所有人)
# =============================================================================
emoji:
  enabled: false
  slash: true
  prefix: true
  base_url: "https://ghimg.siiway.top/emoji"
  max_results: 25
  ratelimit:                  # 限速 (/e / /emoji info)
    enabled: true
    window: 60
    mod_multiplier: 3
    random: 10
    uuid: 10
    "2file": 10
    e: 10
    "emoji-info": 10

# =============================================================================
# 工具/管理指令模块
# 指令: /random /uuid /to-file (所有人, 限速), /delete /clear-message /move-channel (mod)
# =============================================================================
tools:
  enabled: false
  slash: true
  prefix: true
  ratelimit:                  # 限速 (仅作用于 random / uuid / to-file)
    enabled: true             # 是否启用限速
    window: 60                # 时间窗口 (秒)
    mod_multiplier: 3         # mod 的额度倍数 (相对普通用户); admin 不受限速
    random: 10                # random: 普通用户每窗口最大次数
    uuid: 10                  # uuid:   普通用户每窗口最大次数
    "2file": 10               # to-file:  普通用户每窗口最大次数 (YAML 键: "2file")

# =============================================================================
# 频道锁定模块 (使用 Cog 子命令)
# 指令: /lock now, /lock unlock, /lock plan, /lock unplan
# =============================================================================
lock:
  enabled: false
  slash: true
  prefix: true

# =============================================================================
# 自动删除 todo bot 消息 (无指令, 基于事件)
# =============================================================================
rmtodo:
  enabled: false
  todo_channels: []           # todo 频道 ID 列表
  author_id: 782105629572464652  # todo bot 的用户 ID
  remove_delay: 3             # 删除前等待秒数

# =============================================================================
# 自动删除消息 (无指令, 基于事件)
# =============================================================================
rmmsg:
  enabled: false
  nicks: []                   # 要自动删除的昵称模式列表 (支持通配符)

# =============================================================================
# 语音频道控制模块
# 指令: vc join, vc leave
# =============================================================================
voicechannel:
  enabled: false
  slash: true
  prefix: true
  allowed_users: []           # voice 白名单 (全局): 留空则仅 mod 可用
  allowed_guilds: {}           # voice 白名单 (按服务器) { guild_id: [user...] }

# =============================================================================
# 反垃圾消息模块 (无指令, 基于事件)
# =============================================================================
antispam:
  enabled: false
  spam-catcher: {}            # 按频道配置的捕获规则 (见下方示例)
  # 示例:
  # 1514685631316496615:
  #   spammer: ban              # 陌生人处理: kick | ban
  #   hacked: mute              # 疑似被盗处理: kick | ban | mute | 分钟数
  #   clear-message: 3          # 自动清理窗口 (分钟, null/false 禁用)
  #   public-log: true          # 是否在频道公开通知
  #   stranger-roles: [1318980288046698506, "新成员"]  # 被视为陌生人的角色列表 (支持身份组 ID 或名称)
  #   ignored-roles: ["管理员", "成员"]  # 忽略处理的角色列表, 拥有任一角色的成员不会被处理 (支持身份组 ID 或名称)

# =============================================================================
# 管理员和权限配置
# =============================================================================
admins:
  users: []                   # 管理员用户 ID/名称列表 (拥有所有命令权限)

mods:
  users: []                   # 全局 mod 列表
  guilds: {}                  # 按服务器 mod 列表 { guild_id: [user...] }

# =============================================================================
# 动态权限模块 (/perm add, /perm rm, /perm show)
# 权限数据存储在 perm.yaml 中，config.yaml 的 admins/mods 始终优先
# =============================================================================
perm:
  enabled: false              # 是否启用动态权限模块
  # 权限存储在 perm.yaml 中

# =============================================================================
# 公告推送模块 (/subscribe)
# =============================================================================
announce:
  source_channel: null        # 公告频道 ID (News Channel)
  # /subscribe 会使目标频道关注此频道，Discord 自动转发消息
