# =============================================================================
# wyf9s-discord-bot 动态权限配置示例
# 复制为 perm.yaml 使用，或通过 /perm 指令动态管理
# =============================================================================
#
# config.yaml 中的 admins 和 mods 配置始终优先于本文件的规则
# 在 /perm show 中，被 config 覆盖的规则会显示 :lock: 标记
# =============================================================================

rules: []
# 示例规则 (通过 /perm 指令管理，不要手动编辑):
# - id: 1
#   users: ["123456789", "username"]
#   module: "tools"             # 可选: 授权整个模块
#   command: null               # 可选: 授权特定指令 (与 module 互斥)
#   global_scope: false         # true = 全局生效, false = 按服务器
#   guild_id: null              # 服务器 ID (global_scope=true 时为 null)
#   created_by: 123456789
#   created_at: "2024-01-01T00:00:00Z"
