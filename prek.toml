# prek (pre-commit) configuration — https://prek.j178.dev
# Run manually with: uvx prek run --all-files
# Install the git hook with: uvx prek install

# Ruff — official pre-commit hooks (lint + format)
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.21"
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

# Local hooks (ty type check + markdownlint via PyMarkdown)
[[repos]]
repo = "local"

[[repos.hooks]]
id = "ty"
name = "ty check"
language = "system"
entry = "uvx ty check"
pass_filenames = false
files = "\\.py$"

[[repos.hooks]]
id = "markdownlint"
name = "markdownlint (PyMarkdown)"
language = "system"
entry = "uv run pymarkdown --config .pymarkdown.json scan"
files = "\\.md$"
# VitePress `layout: home` pages are frontmatter-only; PyMarkdown's
# front-matter parser can't handle blank lines inside frontmatter.
exclude = "^docs/(en/)?index\\.md$"
